<html>
    <head>
        <title> box model</title>
        <style>
            body{
                font-family:Arial, Helvetica, sans-serif;
                background-color:#1a1a2e;
                display:flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin:0;
            }
            .card{
                background-color:#e94560;
                color:white;
                text-align:center;
                width:220px;
                padding:30px;
                border:5px solid #ffd700;
                margin:20px;
            }

            .card h2{
                font-size:1.3em;
                margin-bottom:10px;
            }
            .card p{
                font-size:0.9em;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2>Thunder kid</h2>
            <p>Attack: 95</p>
            <p>Defense: 72</p>
            <p>speed: 88</p>
            <p>Special: lightning strike</p>
        </div>
    </body>
</html>
