<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make changes to rectangle</title>
    <style>
        h2{
            text-align:center;     
        }
        .rectangle{
            border:1px solid black;
            width:200px;
            height:200px;
            margin:auto;
        }
        .buttons{
            padding:20px;
            width:200px;
            margin:auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Makes changes to the rectangle</h2>

    <div class="rectangle"></div>

    <div class="button">
        <button onclick="changeToCircle()">Make circles</button>
        <button onclick="hideRect()">Hide</button>
        <button onclick="showRect()">Show</button>

        <script>
            let div = document.querySelector( " .rectangle");
            function changeToCircle() {
                div.style.borderRadius = "50%";
            }
            function hideRect() {
               div.style.display = "none";
            }
            function showRect() {
                div.style.display = "block";
            }
            div.onmouseenter = function () {
                div.style.background = "red";
            };
            div.onmouseleave = function () {
                div.style.background = "transparent";
            };
        </script>
    </div>
</body>
</html>
