<html>
    <head>
        <title>Use of carousels and indicators</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body{
                background-color: lightgoldenrodyellow;
                font-family:Arial, Helvetica, sans-serif
            }
            h1{
                text-align:center;
                margin-top:40px;
                margin-bottom:40px;
                color:bLACK;
            }
            .carousel img{
                object-fit:cover;
            }
            .carousel caption{
                padding:15px;
                border-radius:10px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Explore Different Countries</h1>
            <div id="travelcarousel" class="carousel slide" data-bs-ride="carousel">
                <!--indicators-->
               <div class="carousel-indicators">
               <button type="button" data-bs-target="#travelcarousel" data-bs-slide-to="0" class="active"></button>
              <button type="button" data-bs-target="#travelcarousels"
              data-bs-slide-to="1"></button>
              <button type="button" data-bs-target="#travelcarousel" data-bs-slide-to="2"></button>
              <button type="button" data-bs-target="#travelcarousel" data-bs-slide-to="3"></button>
               </div>
                   <!--carousels slides-->
                   <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="dubai.jpg" class="d-block w-100" alt="dubai">
                        <div class="carousel-caption">
                            <h3>Dubai UAE</h3>
                            <P>Discover luxury shopping and breathtaking scenery</P>
                        </div>
                    </div>
                    <div class="carousel-item active">
                        <img src="paris.jpg" class="d-block w-100" alt="dubai">
                        <div class="carousel-caption">
                            <h3>Paris France</h3>
                            <P>visit the effiel tower and enjoy the beautiful city</P>
                        </div>
                    </div>
                    <div class="carousel-item active">
                        <img src="Maldives.jpg" class="d-block w-100" alt="dubai">
                        <div class="carousel-caption">
                            <h3>Maldives</h3>
                            <P>Relax on white sandy beaches and crystal clear water </P>
                        </div>
                    </div>
                   </div>
                   <!--Previous Button-->
                   <button class=" carousels-control-prev"
                   type="button"
                   data-bs-target="#travelcarousel"
                   data-bs-slide="prev">
                   <span class="carousel-control-prev-icon"></span>
                </button>
                <!--next button -->
                <button class="carousel-control-next"
                type="button"
                data-bs-target="#travelcarousel"
                data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
