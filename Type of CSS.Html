<html>
    <head>
        <style>
            h1{
                color: blue;
            }
            .iyanu{
                font-size: 20px;
            }
            #ola{
                color: pink;
            }
        </style>
        <title> Type of Css</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <p style="color: red;">this is an inline css </p>
        <h1>This is an internal CSS</h1>
        <h2>This is external css</h2>
        <p class="iyanu">This is a class selector</p>
        <h2 id="ola">This is ID selectors</h2>
    </body>
</html>
