<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parameterr</title>
     <style>
        body {
            font-family: Arial, sans-serif;
            background-color: palevioletred;
            padding: 20px;
        }

        h1 {
            color: yellow;;
            text-align: center;
        }

        .student {
            background-color: blanchedalmond;
            border: 2px solid #007BFF;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        h3 {
            color: #007BFF;
        }
    </style>
</head>
<body>
    <h1>Student Information Using Parameters</h1>

<div id="output"></div>

<script>

function studentInformation(name, age, course, college) {

    document.getElementById("output").innerHTML +=
    "<div class='student'>" +
    "<h3>Student Details</h3>" +
    "<p><strong>Name:</strong> " + name + "</p>" +
    "<p><strong>Age:</strong> " + age + "</p>" +
    "<p><strong>Course:</strong> " + course + "</p>" +
    "<p><strong>College:</strong> " + college + "</p>" +
    "</div>";

}

// Function Calls

studentInformation("Lizzy", 18, "Web Development", "Newcastle College");

studentInformation("olamide Adeduro", 19, "Health and Social Care", "Gateshead College");

studentInformation("Sarah", 20, "Business", "Northumbria College");

</script>
</body>
</html>
